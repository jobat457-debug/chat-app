<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Room WhatsApp Style</title>
    <style>
        /* Tema Dark Mode Default Bawaan */
        :root {
            --bg-color: #121c21;
            --chat-bg: #0b141a;
            --text-main: #e9edef;
            --text-muted: #8696a0;
            --accent: #00a884;
            --msg-in: #202c33;
            --msg-out: #005c4b;
            --border: #2a3942;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }
        
        /* Header */
        header { 
            background: var(--msg-in); 
            padding: 15px 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            border-bottom: 1px solid var(--border); 
        }
        .header-info { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
        }
        .profile-pic { 
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
            background: #555; 
            object-fit: cover; 
            cursor: pointer; 
            border: 1px solid var(--border);
        }
        
        /* Chat Area */
        #chat-container { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            background-color: var(--chat-bg); 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        
        .msg { 
            max-width: 75%; 
            padding: 8px 12px; 
            border-radius: 8px; 
            position: relative; 
            word-wrap: break-word; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        .msg.in { 
            background: var(--msg-in); 
            align-self: flex-start; 
            border-top-left-radius: 0; 
        }
        .msg.out { 
            background: var(--msg-out); 
            align-self: flex-end; 
            border-top-right-radius: 0; 
        }
        
        .msg-sender { 
            font-size: 0.8rem; 
            color: var(--accent); 
            font-weight: bold; 
            margin-bottom: 4px; 
        }
        .msg-time { 
            font-size: 0.7rem; 
            color: var(--text-muted); 
            text-align: right; 
            margin-top: 4px; 
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
        }
        .msg img { 
            max-width: 100%; 
            max-height: 250px;
            border-radius: 6px; 
            margin-top: 5px; 
            display: block;
        }
        .deleted-msg { 
            font-style: italic; 
            color: var(--text-muted); 
        }
        .delete-btn { 
            font-size: 0.7rem; 
            color: #ff5b5b; 
            cursor: pointer; 
            text-decoration: underline;
        }

        /* Input Area */
        #input-area { 
            background: var(--msg-in); 
            padding: 12px 20px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            border-top: 1px solid var(--border);
        }
        #input-area input[type="text"] { 
            flex: 1; 
            padding: 12px 18px; 
            border-radius: 24px; 
            border: none; 
            background: var(--border); 
            color: var(--text-main); 
            outline: none; 
            font-size: 0.95rem;
        }
        .btn-action { 
            background: transparent; 
            border: none; 
            color: var(--text-muted); 
            font-size: 1.4rem; 
            cursor: pointer; 
            transition: 0.2s; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-action:hover { 
            color: var(--accent); 
        }
        
        /* Modal Overlay */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.85); 
            align-items: center; 
            justify-content: center; 
            z-index: 1000; 
        }
        .modal-content { 
            background: var(--msg-in); 
            padding: 30px; 
            border-radius: 12px; 
            width: 90%; 
            max-width: 360px; 
            text-align: center; 
            border: 1px solid var(--border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .modal-content h2 {
            margin-bottom: 15px;
            font-size: 1.4rem;
        }
        .modal-content input { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border-radius: 6px; 
            border: 1px solid var(--border); 
            background: var(--chat-bg); 
            color: white; 
            outline: none;
        }
        .modal-content button { 
            width: 100%; 
            padding: 12px; 
            background: var(--accent); 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 10px;
            font-size: 1rem;
        }
        .modal-content p { 
            margin-top: 18px; 
            font-size: 0.85rem; 
            color: var(--text-muted); 
            cursor: pointer; 
            text-decoration: underline;
        }
        .modal-content p:hover { 
            color: var(--accent); 
        }

        /* Sembunyikan elemen input fail */
        input[type="file"] { 
            display: none; 
        }
    </style>
</head>
<body>

    <header>
        <div class="header-info">
            <img src="https://via.placeholder.com/40" id="user-pp" class="profile-pic" title="Tukar Gambar Profil" onclick="document.getElementById('pp-upload').click()">
            <input type="file" id="pp-upload" accept="image/*">
            <div>
                <h3 style="font-size: 1.05rem;">Room Global</h3>
                <span id="user-display" style="font-size: 0.8rem; color: var(--text-muted);">Pelawat (Sila Login)</span>
            </div>
        </div>
    </header>

    <div id="chat-container"></div>

    <div id="input-area">
        <label for="img-upload" class="btn-action" title="Hantar Gambar">📷</label>
        <input type="file" id="img-upload" accept="image/*">
        
        <button class="btn-action" title="Hantar Stiker" onclick="sendMsg('🚀', 'text')">⭐</button>

        <input type="text" id="msg-input" placeholder="Taip mesej..." autocomplete="off" onclick="checkLoginFocus()">
        <button class="btn-action" style="color: var(--accent);" onclick="sendMsg()" title="Hantar Mesej">➤</button>
    </div>

    <div class="modal" id="auth-modal">
        <div class="modal-content">
            <h2 id="auth-title">Login</h2>
            <input type="text" id="auth-user" placeholder="Username">
            <input type="password" id="auth-pass" placeholder="Password">
            <button onclick="doAuth()">Hantar</button>
            <p id="auth-toggle" onclick="toggleAuth()">Belum ada akaun? Daftar di sini</p>
        </div>
    </div>

<script>
    // URL Google Apps Script yang anda berikan
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwGaB8rZrNB87vLboyUA52N9hCqNAd9KYVdqRv9XumNxZFpqYB-wdo53DQdfLAtXPNx/exec'; 

    let currentUser = localStorage.getItem('username');
    let isLoginMode = true;

    // Jalankan aplikasi pertama kali dibuka
    window.onload = () => {
        if(currentUser) {
            document.getElementById('user-display').innerText = currentUser;
            let pp = localStorage.getItem('profilePic');
            if(pp) document.getElementById('user-pp').src = pp;
        }
        loadChats();
        setInterval(loadChats, 3000); // Semak mesej baharu setiap 3 saat
    };

    // Fungsi semak login apabila input chat diklik
    function checkLoginFocus() {
        if (!currentUser) {
            document.getElementById('msg-input').blur();
            document.getElementById('auth-modal').style.display = 'flex';
        }
    }

    // Tukar paparan modal antara Login dan Register
    function toggleAuth() {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').innerText = isLoginMode ? 'Login' : 'Daftar Akaun';
        document.getElementById('auth-toggle').innerText = isLoginMode ? 'Belum ada akaun? Daftar di sini' : 'Sudah ada akaun? Login di sini';
    }

    // Proses Login atau Register
    async function doAuth() {
        let u = document.getElementById('auth-user').value.trim();
        let p = document.getElementById('auth-pass').value.trim();
        if(!u || !p) return alert("Sila isi username dan password!");

        let action = isLoginMode ? 'login' : 'register';
        
        try {
            let res = await fetch(GAS_URL, {
                method: 'POST', 
                body: JSON.stringify({ action: action, username: u, password: p })
            });
            let result = await res.json();

            if(result.status === 'success') {
                if (isLoginMode) {
                    localStorage.setItem('username', u);
                    currentUser = u;
                    if(result.profilePic) {
                        localStorage.setItem('profilePic', result.profilePic);
                        document.getElementById('user-pp').src = result.profilePic;
                    } else {
                        document.getElementById('user-pp').src = 'https://via.placeholder.com/40';
                    }
                    document.getElementById('user-display').innerText = u;
                    document.getElementById('auth-modal').style.display = 'none';
                    alert("Login Berjaya!");
                } else {
                    alert("Pendaftaran berjaya! Sila masukkan butiran untuk login.");
                    toggleAuth();
                }
            } else {
                alert(result.message);
            }
        } catch (err) {
            alert("Ralat sambungan ke pelayan database.");
        }
    }

    // Ambil data chat dari Google Sheets
    async function loadChats() {
        try {
            let res = await fetch(GAS_URL);
            let result = await res.json();
            
            if(result.status === 'success') {
                let container = document.getElementById('chat-container');
                let isScrolledToBottom = container.scrollHeight - container.clientHeight <= container.scrollTop + 50;
                
                container.innerHTML = '';
                result.data.forEach(chat => {
                    let div = document.createElement('div');
                    let isMe = chat.username === currentUser;
                    div.className = `msg ${isMe ? 'out' : 'in'}`;

                    if (chat.isDeleted === true || chat.isDeleted === "true") {
                        div.innerHTML = `<span class="deleted-msg">🚫 Mesej ini telah ditarik balik</span>`;
                    } else {
                        let contentHTML = chat.type === 'image' 
                            ? `<img src="${chat.content}">` 
                            : `<span>${chat.content}</span>`;
                        
                        let delBtn = isMe ? `<span class="delete-btn" onclick="deleteChat('${chat.id}')">Tarik</span>` : '';

                        div.innerHTML = `
                            ${!isMe ? `<div class="msg-sender">${chat.username}</div>` : ''}
                            ${contentHTML}
                            <div class="msg-time">
                                ${new Date(chat.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                                ${delBtn}
                            </div>
                        `;
                    }
                    container.appendChild(div);
                });

                if(isScrolledToBottom) container.scrollTop = container.scrollHeight;
            }
        } catch (e) {
            console.error("Gagal memuatkan sembang:", e);
        }
    }

    // Fungsi Hantar Mesej (Teks / Gambar / Stiker)
    async function sendMsg(content = null, type = 'text') {
        if(!currentUser) return checkLoginFocus();
        
        let msg = content || document.getElementById('msg-input').value.trim();
        if(!msg && type === 'text') return;

        document.getElementById('msg-input').value = ''; 
        
        // Paparan Sementara (Optimistic UI)
        let container = document.getElementById('chat-container');
        let tempDiv = document.createElement('div');
        tempDiv.className = 'msg out';
        tempDiv.innerHTML = `<i>Menghantar...</i>`;
        container.appendChild(tempDiv);
        container.scrollTop = container.scrollHeight;

        try {
            await fetch(GAS_URL, {
                method: 'POST', 
                body: JSON.stringify({ action: 'send_chat', username: currentUser, type: type, content: msg })
            });
            loadChats();
        } catch (err) {
            alert("Gagal menghantar mesej.");
            loadChats();
        }
    }

    // Padam / Tarik Balik Mesej
    async function deleteChat(id) {
        if(confirm("Tarik balik mesej ini?")) {
            try {
                await fetch(GAS_URL, {
                    method: 'POST', 
                    body: JSON.stringify({ action: 'delete_chat', id: id, username: currentUser })
                });
                loadChats();
            } catch (err) {
                alert("Gagal menarik balik mesej.");
            }
        }
    }

    // Fungsi Kecilkan Saiz Gambar & Tukar ke Base64
    function resizeImageAndConvert(file, callback) {
        let reader = new FileReader();
        reader.onload = function(e) {
            let img = new Image();
            img.onload = function() {
                let canvas = document.createElement('canvas');
                let ctx = canvas.getContext('2d');
                let MAX_WIDTH = 400; // Dikompres supaya saiz muatan Google Sheets stabil
                let scaleSize = MAX_WIDTH / img.width;
                canvas.width = MAX_WIDTH;
                canvas.height = img.height * scaleSize;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                callback(canvas.toDataURL('image/jpeg', 0.7));
            }
            img.src = e.target.result;
        }
        reader.readAsDataURL(file);
    }

    // Event Pengendali Fail Gambar Chat
    document.getElementById('img-upload').addEventListener('change', function(e) {
        if(!currentUser) return checkLoginFocus();
        if(this.files[0]) {
            resizeImageAndConvert(this.files[0], base64 => {
                sendMsg(base64, 'image');
            });
        }
    });

    // Event Pengendali Fail Gambar Profil
    document.getElementById('pp-upload').addEventListener('change', function(e) {
        if(!currentUser) return checkLoginFocus();
        if(this.files[0]) {
            resizeImageAndConvert(this.files[0], async base64 => {
                document.getElementById('user-pp').src = base64;
                localStorage.setItem('profilePic', base64);
                try {
                    await fetch(GAS_URL, {
                        method: 'POST', 
                        body: JSON.stringify({ action: 'update_profile', username: currentUser, profilePic: base64 })
                    });
                } catch(err) {
                    console.error("Gagal mengemaskini gambar profil di pelayan.");
                }
            });
        }
    });

    // Hantar apabila butang Enter ditekan
    document.getElementById('msg-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') sendMsg();
    });
</script>
</body>
</html>
